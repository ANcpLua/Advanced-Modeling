name: Generate PlantUML Diagrams

on:
  push:
    paths:
      - '**.puml'
      - '**.plantuml'
  pull_request:
    paths:
      - '**.puml'
      - '**.plantuml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Generate PlantUML diagrams
        uses: grassedge/generate-plantuml-action@4936762686b831393728392054322cfde20645e8 # v1.5
        with:
          path: .
          message: "Auto-generate PlantUML diagrams [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
